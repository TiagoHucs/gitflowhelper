
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lista de Projetos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Projetos</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Diretório</th>
        <th>Ação</th>
    </tr>
    </thead>
    <tbody id="tabela"></tbody>
</table>
<br>
<button onclick="cadastro()">Cadastro</button>

<script>
function carregar() {
    fetch("/projetos")
    .then(r => r.json())
    .then(data => {
        let html = "";
        data.forEach(p => {
            html += `<tr>
                <td>${p.id}</td>
                <td>${p.nome}</td>
                <td>${p.diretorio}</td>
                <td>
                    <button class="detail" onclick="detalhar(${p.id})">🔍</button>
                    <button class="delete" onclick="del(${p.id})">🗑️</button>
                </td>
            </tr>`;
        });
        document.getElementById("tabela").innerHTML = html;
    });
}

function detalhar(id) {
    window.location.href = "detalhe.html?id=" + id;
}

function del(id) {
    const confirmar = confirm("Tem certeza que deseja deletar este projeto?");

    if (!confirmar) return;

    fetch("/projetos/" + id, { method: "DELETE" })
        .then(() => carregar());
}

function cadastro() {
   window.location.href = "cadastro.html";
}

carregar();
</script>
</body>
</html>
